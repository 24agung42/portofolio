<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		* {
			margin: 0;
			padding: 0;
			font-family: Georgia;
			color: #5b5c5e;
		}

		body { background-image: linear-gradient(145deg, #ffffff, #a4e7fd, #6363ff); }
		table { border-collapse: collapse; }

		.icon { width: 25px; height: 25px; margin: 8px; }
		.data_ttl { font-size: 30px; font-weight: bold; }
	</style>
</head>
<body>
	<center><table style="width: 80%;" id="place">
		<tr><td id="head" align="center" valign="middle" colspan="2" style="height: 100px; font-size: 70px;"></td></tr>
		<tr>
			<td style="width: 25%;" valign="top">
				<table style="width: 100%;">
					<tr><td>
						<table>
							<tr>
								<td colspan="2" align="center">
									<div style="padding: 10px 10px 6px 10px; width: fit-content; background-color: white;"><img id="img" style="width: 136px; height: 181px; background-image: linear-gradient(to top, #ffffff, #a4e7fd); background-repeat: no-repeat; background-position: 50% 100%;"></div>
								</td>
							</tr>
							<tr><td id="nama" colspan="2" align="center" style="font-size: 20px;"></td></tr>
							<tr>
								<td><img class="icon" src="handphone.png"></td>
								<td id="hp"></td>
							</tr>
							<tr>
								<td><img class="icon" src="email.png"></td>
								<td id="email"></td>
							</tr>
							<tr>
								<td><img class="icon" src="github.png"></td>
								<td id="github"></td>
							</tr>
							<tr>
								<td valign="top"><img class="icon" src="address.png"></td>
								<td id="alamat"></td>
							</tr>
						</table>
					</td></tr>
				</table>
			</td>
			<td><table id="data" style="width: 100%; height: 100%; margin-left: 10px;"></table></td>
		</tr>
	</table></center>
	<script type="text/javascript" src="jquery-3.7.1.min.js"></script>
	<script type="text/javascript">
		$(function () {
			window.setInterval(function () {
				$.ajax({
					dataType:'json',
					url:'jsonData.json',
					success: function (required) {
						$(document).prop('title', required.title);
						$('#head').html(required.head);
						$('#img').prop('src',required.img+'?timestamp='+new Date().getTime());
						$('#nama').html(required.nama);
						$('#hp').html(required.hp);
						$('#email').html(required.email);
						$('#github').html(required.github);
						$('#alamat').html(required.alamat);
						var data = '';
						required.data.forEach(function (value,key) {
							data += '<tr><td class="data_ttl">'+value.ttl+'</td></tr>';
							data += '<tr><td>'+value.value+'</td></tr>';
							data += '<tr><td><br><br></td></tr>';
						});
						$('#data').html(data);
						$('body').css('background-size','100% '+$('#place').height()+'px');
					}
				});
			}, 1000);
		});
	</script>
</body>
</html>
